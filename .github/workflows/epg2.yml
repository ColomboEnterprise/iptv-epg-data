name: EPG

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Erstelle Ordner
        run: mkdir -p public/epg/de
      
      - name: Lade EPG von GitHub
        run: |
          curl -L -o public/epg/de/ard.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/ARD.xml" || true
          curl -L -o public/epg/de/zdf.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/ZDF.xml" || true
          curl -L -o public/epg/de/rtl.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/RTL.xml" || true
          curl -L -o public/epg/de/sat1.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/SAT.1.xml" || true
          curl -L -o public/epg/de/prosieben.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/ProSieben.xml" || true
          curl -L -o public/epg/de/vox.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/VOX.xml" || true
      
      - name: Kombiniere zu gesamt.xml
        run: |
          cd public/epg/de
          echo '<?xml version="1.0" encoding="UTF-8"?>' > gesamt.xml
          echo '<tv>' >> gesamt.xml
          for file in *.xml; do
            if [ -f "$file" ]; then
              sed -n '/<channel/,/<\/channel>/p' "$file" >> gesamt.xml 2>/dev/null || true
              sed -n '/<programme/,/<\/programme>/p' "$file" >> gesamt.xml 2>/dev/null || true
            fi
          done
          echo '</tv>' >> gesamt.xml
          echo "✅ gesamt.xml erstellt mit $(grep -c '<programme' gesamt.xml) Programmen"
      
      - name: Erstelle index.json
        run: |
          cd public/epg/de
          channel_count=$(grep -c '<channel' gesamt.xml)
          programme_count=$(grep -c '<programme' gesamt.xml)
          cat > index.json << EOF
      {
        "lastUpdate": "$(date -Iseconds)",
        "country": "Deutschland",
        "totalChannels": $channel_count,
        "totalProgrammes": $programme_count,
        "channels": [
          {
            "channel": "gesamt",
            "file": "gesamt.xml"
          }
        ]
      }
      EOF
      
      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv-epg-data
          directory: public
