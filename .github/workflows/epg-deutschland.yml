name: EPG für Deutschland generieren

on:
  schedule:
    # Läuft täglich um 2:00 Uhr UTC (3:00 Uhr deutscher Zeit)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Ermöglicht manuellen Start

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Maximal 60 Minuten Laufzeit
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: iptv-org/epg Repository klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
      
      - name: EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          echo ""
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public
          
          cd epg
          
          # Liste der wichtigsten deutschen Sender
          # (ARD, ZDF, RTL, ProSieben, etc.)
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "kabeleins.de"
            "vox.de"
            "ntv.de"
            "welt.de"
            "dmax.de"
            "tele5.de"
            "sixx.de"
            "rtl2.de"
            "superrtl.de"
            "kika.de"
            "3sat.de"
            "arte.tv"
            "phoenix.de"
            "tagesschau24.de"
            "einsfestival.de"
            "br.de"
            "hr-fernsehen.de"
            "mdr.de"
            "ndr.de"
            "rbb-online.de"
            "sr.de"
            "swr.de"
            "wdr.de"
          )
          
          gesamt=${#SENDER[@]}
          aktuell=0
          
          for sender in "${SENDER[@]}"; do
            aktuell=$((aktuell + 1))
            echo ""
            echo "================================================"
            echo "[$aktuell/$gesamt] Generiere EPG für $sender..."
            echo "================================================"
            
            # EPG für diesen Sender generieren
            npm run grab --- --site=$sender --output=../public/$sender.xml --days=7 --gzip --maxConnections=3 || echo "⚠️ Fehler bei $sender, fahre fort..."
            
            # Kleine Pause zwischen den Sendern
            sleep 1
          done
          
          echo ""
          echo "✅ EPG-Generierung abgeschlossen!"
      
      - name: Gesamtdatei für Deutschland erstellen
        run: |
          echo "📊 Erstelle Gesamt-EPG für Deutschland..."
          
          cd public
          
          # Index-Datei mit allen verfügbaren Sendern erstellen
          cat > index.json << EOF
          {
            "lastUpdate": "$(date -Iseconds)",
            "country": "Deutschland",
            "countryCode": "de",
            "totalChannels": $(ls *.xml 2>/dev/null | wc -l),
            "channels": [
          EOF
          
          first=1
          for file in *.xml; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> index.json
            fi
            channel=$(basename "$file" .xml)
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo "0")
            echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"size\": $size}" >> index.json
          done
          
          cat >> index.json << EOF
          
            ]
          }
          EOF
          
          echo "✅ index.json erstellt"
          
          # Gesamtdatei erstellen (für einfachen Zugriff)
          echo "📦 Erstelle gesamt.xml (kombiniert alle deutschen Sender)..."
          cat $(ls *.xml | sort) > gesamt.xml 2>/dev/null || echo "Keine XML-Dateien gefunden"
          
          # Größen anzeigen
          echo ""
          echo "📊 Generierte Dateien:"
          ls -lh
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg-deutschland"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
