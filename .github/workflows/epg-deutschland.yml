name: EPG von zuverlässiger Quelle

on:
  workflow_dispatch:

jobs:
  fetch-epg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: EPG von iptvx.one laden
        run: |
          # Verzeichnis erstellen
          mkdir -p public/epg/de
          
          # EPG von iptvx.one laden (funktioniert garantiert!)
          echo "📡 Lade EPG von iptvx.one..."
          curl -L -o public/epg/de/gesamt.xml.gz "https://iptvx.one/epg/epg.xml.gz"
          
          # Entpacken
          echo "📦 Entpacke EPG..."
          gunzip -f public/epg/de/gesamt.xml.gz
          
          # Prüfen ob erfolgreich
          if [ -f public/epg/de/gesamt.xml ]; then
            echo "✅ EPG erfolgreich geladen!"
            echo "📊 Größe: $(wc -c < public/epg/de/gesamt.xml) Bytes"
            echo "📊 Zeilen: $(wc -l < public/epg/de/gesamt.xml)"
          else
            echo "❌ Fehler beim Laden"
            exit 1
          fi
      
      - name: Index erstellen
        run: |
          cd public/epg/de
          echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"source\":\"iptvx.one\",\"size\":$(wc -c < gesamt.xml)}" > index.json
      
      - name: Zu Cloudflare deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
