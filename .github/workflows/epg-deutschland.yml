name: EPG Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Erstelle Dummy-EPG
        run: |
          mkdir -p public/epg/de
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/de/gesamt.xml
          echo '<tv>' >> public/epg/de/gesamt.xml
          echo '  <channel id="ard.de">' >> public/epg/de/gesamt.xml
          echo '    <display-name>ARD</display-name>' >> public/epg/de/gesamt.xml
          echo '  </channel>' >> public/epg/de/gesamt.xml
          echo '  <programme channel="ard.de" start="20250311200000 +0100" stop="20250311201500 +0100">' >> public/epg/de/gesamt.xml
          echo '    <title>Tagesschau</title>' >> public/epg/de/gesamt.xml
          echo '  </programme>' >> public/epg/de/gesamt.xml
          echo '</tv>' >> public/epg/de/gesamt.xml
          
          echo '{"lastUpdate":"2025-03-11","country":"Deutschland","channels":[{"channel":"gesamt","file":"gesamt.xml"}]}' > public/epg/de/index.json
      
      - name: Zeige Dateien
        run: ls -la public/epg/de/
      
      - name: Deploy zu Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
