name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 EPG von alternativen Quellen laden
        run: |
          echo "🚀 Lade EPG von alternativen Quellen..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          # Alternative 1: EPG von GitHub (weareblahs)
          echo "📡 Versuche Quelle 1: weareblahs/epg..."
          curl -L -o public/epg/de/ard.de.xml "https://raw.githubusercontent.com/weareblahs/epg/main/guides/de/ARD.xml" || echo "⚠️ Quelle 1 fehlgeschlagen"
          
          # Alternative 2: EPG von epg.ovh
          echo "📡 Versuche Quelle 2: epg.ovh..."
          curl -L -o public/epg/de/gesamt.xml "https://epg.ovh/epg.xml" || echo "⚠️ Quelle 2 fehlgeschlagen"
          
          # Alternative 3: IPTV-org XML
          echo "📡 Versuche Quelle 3: iptv-org..."
          curl -L -o public/epg/de/ard.de.xml "https://iptv-org.github.io/epg/guides/de/ard.iptv-org.xml" || echo "⚠️ Quelle 3 fehlgeschlagen"
          
          # Alternative 4: Open-EPG
          echo "📡 Versuche Quelle 4: open-epg.com..."
          curl -L -o public/epg/de/germany.xml "https://www.open-epg.com/files/germany1.xml.gz" || echo "⚠️ Quelle 4 fehlgeschlagen"
          
          # Wenn gz Datei, entpacken
          if [ -f public/epg/de/germany.xml.gz ]; then
            echo "📦 Entpacke germany.xml.gz..."
            gunzip -c public/epg/de/germany.xml.gz > public/epg/de/open-epg.xml
            rm public/epg/de/germany.xml.gz
          fi
      
      - name: 📊 Prüfe und erstelle EPG-Dateien
        run: |
          cd public/epg/de
          
          echo "📁 Gefundene Dateien:"
          ls -la
          
          # Wenn keine Dateien, erstelle Dummy-EPG
          if [ ! -f *.xml ]; then
            echo "⚠️ Keine EPG-Dateien gefunden. Erstelle Dummy-EPG..."
            
            cat > dummy.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
    <display-name>Das Erste</display-name>
  </channel>
  <channel id="zdf.de">
    <display-name>ZDF</display-name>
  </channel>
  <channel id="rtl.de">
    <display-name>RTL</display-name>
  </channel>
  <programme channel="ard.de" start="$(date -u +'%Y%m%d%H%M%00') +0100" stop="$(date -u -d '+30 minutes' +'%Y%m%d%H%M%00') +0100">
    <title>Tagesschau</title>
    <desc>Die Nachrichten des Tages</desc>
    <category>Nachrichten</category>
  </programme>
  <programme channel="ard.de" start="$(date -u -d '+30 minutes' +'%Y%m%d%H%M%00') +0100" stop="$(date -u -d '+60 minutes' +'%Y%m%d%H%M%00') +0100">
    <title>Wetter</title>
    <desc>Der Wetterbericht</desc>
    <category>Wetter</category>
  </programme>
  <programme channel="zdf.de" start="$(date -u +'%Y%m%d%H%M%00') +0100" stop="$(date -u -d '+45 minutes' +'%Y%m%d%H%M%00') +0100">
    <title>heute journal</title>
    <desc>Nachrichten aus Deutschland und der Welt</desc>
    <category>Nachrichten</category>
  </programme>
  <programme channel="rtl.de" start="$(date -u +'%Y%m%d%H%M%00') +0100" stop="$(date -u -d '+60 minutes' +'%Y%m%d%H%M%00') +0100">
    <title>RTL Aktuell</title>
    <desc>Das aktuelle Nachrichtenmagazin</desc>
    <category>Nachrichten</category>
  </programme>
</tv>
EOF
            echo "✅ Dummy-EPG erstellt"
          fi
          
          # Erstelle gesamt.xml aus allen XML-Dateien
          echo "🔄 Erstelle gesamt.xml..."
          
          # Sammle alle XML-Dateien (außer gesamt.xml selbst)
          xml_files=$(ls *.xml | grep -v "gesamt.xml" 2>/dev/null || echo "")
          
          if [ -n "$xml_files" ]; then
            # Kopiere erste Datei als Basis
            first_file=$(echo "$xml_files" | head -1)
            cp "$first_file" gesamt.xml
            
            # Entferne schließenden </tv> Tag
            sed -i '$d' gesamt.xml
            
            # Füge die anderen Dateien hinzu (ohne Header und Footer)
            for file in $xml_files; do
              if [ "$file" != "$first_file" ]; then
                sed '1d' "$file" | sed '$d' >> gesamt.xml || true
              fi
            done
            
            # Füge abschließenden </tv> Tag hinzu
            echo "</tv>" >> gesamt.xml
          else
            # Falls keine Einzeldateien, verwende dummy.xml als gesamt.xml
            cp dummy.xml gesamt.xml 2>/dev/null || echo "Keine Dateien verfügbar"
          fi
          
          echo "✅ gesamt.xml erstellt"
          
          # Erstelle index.json
          echo "📊 Erstelle index.json..."
          
          # Zähle Kanäle
          if [ -f gesamt.xml ]; then
            channel_count=$(grep -c "<channel id=" gesamt.xml || echo "0")
          else
            channel_count=0
          fi
          
          cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": ${channel_count:-0},
  "channels": [
    {
      "channel": "gesamt",
      "file": "gesamt.xml",
      "size": $(wc -c < gesamt.xml 2>/dev/null || echo "0")
    }
  ]
}
EOF
          
          echo "✅ index.json erstellt"
      
      - name: 📋 Zeige generierte Dateien
        run: |
          echo "📁 Inhalt von public/epg/de/:"
          ls -la public/epg/de/
          
          echo ""
          echo "📄 Erste 500 Zeichen von gesamt.xml:"
          head -c 500 public/epg/de/gesamt.xml 2>/dev/null || echo "Keine Datei"
          
          echo ""
          echo "📄 index.json:"
          cat public/epg/de/index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Abschluss
        run: |
          echo ""
          echo "================================================"
          echo "✅ EPG-Generierung abgeschlossen!"
          echo "================================================"
          echo "📊 Verfügbar unter:"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/gesamt.xml"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/index.json"
          echo ""
          echo "⏰ Nächstes Update: Morgen um 2:00 UTC"
          echo "================================================"
