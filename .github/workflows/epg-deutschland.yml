name: EPG Deutschland

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Täglich um 2:00 UTC

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG laden und aufteilen
        run: |
          # Verzeichnis erstellen
          mkdir -p public/epg/de
          
          # EPG laden
          echo "📡 Lade EPG von iptvx.one..."
          curl -L -o epg.xml.gz "https://iptvx.one/epg/epg.xml.gz"
          
          # Entpacken
          echo "📦 Entpacke EPG..."
          gunzip -f epg.xml.gz
          
          # Dateigröße anzeigen
          TOTAL_SIZE=$(wc -c < epg.xml)
          echo "📊 Gesamtgröße: $(($TOTAL_SIZE / 1024 / 1024)) MB"
          
          # XML-Header und Footer
          echo '<?xml version="1.0" encoding="UTF-8"?><tv>' > header.xml
          echo '</tv>' > footer.xml
          
          # In 50000 Zeilen-Blöcke aufteilen
          echo "✂️ Teile EPG in kleinere Dateien..."
          split -l 50000 epg.xml teil_ --additional-suffix=.xml
          
          # Teile zählen
          teile=$(ls teil_*.xml 2>/dev/null | wc -l)
          echo "📊 $teile Teile werden erstellt"
          
          # Jeden Teil verarbeiten
          cd public/epg/de
          part_num=1
          
          for file in ../../../teil_*.xml; do
            if [ -f "$file" ]; then
              # Header + Inhalt + Footer
              cat ../../../header.xml "$file" ../../../footer.xml > "epg_teil_$part_num.xml"
              
              # Komprimieren
              gzip -f "epg_teil_$part_num.xml"
              
              # Größe anzeigen
              size=$(wc -c < "epg_teil_$part_num.xml.gz")
              echo "   ✅ Teil $part_num: $(($size / 1024)) KB"
              
              part_num=$((part_num + 1))
            fi
          done
          
          # Aufräumen
          rm -f ../../../teil_*.xml ../../../header.xml ../../../footer.xml
          
          # Index.json mit allen Teilen erstellen
          cat > index.json << EOF
          {
            "lastUpdate": "$(date -Iseconds)",
            "country": "Deutschland",
            "countryCode": "de",
            "totalParts": $((part_num - 1)),
            "totalSize": $TOTAL_SIZE,
            "files": [
          EOF
          
          first=1
          for i in $(seq 1 $((part_num - 1))); do
            if [ -f "epg_teil_${i}.xml.gz" ]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              size=$(wc -c < "epg_teil_${i}.xml.gz")
              echo "    {\"part\": $i, \"file\": \"epg_teil_${i}.xml.gz\", \"size\": $size}" >> index.json
            fi
          done
          
          echo "  ]}" >> index.json
          
          echo ""
          echo "✅ Fertig! Erstellte Dateien:"
          ls -la
          
          cd ../../..
      
      - name: Zu Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Abschluss
        run: |
          echo ""
          echo "=========================================="
          echo "✅ EPG-Update erfolgreich!"
          echo "=========================================="
          echo ""
          echo "📊 Verfügbar unter:"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/index.json"
          for i in {1..27}; do
            echo "   • https://iptv-epg-data.pages.dev/epg/de/epg_teil_${i}.xml.gz"
          done
          echo ""
          echo "📦 Gesamtgröße: 708 MB aufgeteilt in 27 Teile"
          echo "=========================================="
