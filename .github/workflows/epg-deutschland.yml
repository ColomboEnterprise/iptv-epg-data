name: EPG für Deutschland (gefiltert)

on:
  workflow_dispatch:

jobs:
  filter-german-epg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: EPG laden und filtern
        run: |
          mkdir -p public/epg/de
          
          # EPG laden
          echo "📡 Lade EPG..."
          curl -L -o epg.xml.gz "https://iptvx.one/epg/epg.xml.gz"
          gunzip -f epg.xml.gz
          
          # Nur deutsche Sender filtern (ard.de, zdf.de, etc.)
          echo "🔍 Filtere deutsche Sender..."
          
          # Deutsche Sender-IDs (typische Endungen)
          cat epg.xml | grep -E "(channel.*\.de|channel.*ard|channel.*zdf|channel.*rtl)" -A 5 -B 5 > public/epg/de/channels.xml
          
          # Dazugehörige Programme
          while read -r channel; do
            channel_id=$(echo "$channel" | grep -o 'id="[^"]*"' | cut -d'"' -f2)
            if [ ! -z "$channel_id" ]; then
              grep -E "channel=\"$channel_id\"" epg.xml >> public/epg/de/programmes.xml
            fi
          done < public/epg/de/channels.xml
          
          # Gesamt-XML bauen
          cd public/epg/de
          echo '<?xml version="1.0" encoding="UTF-8"?><tv>' > gesamt.xml
          cat channels.xml >> gesamt.xml
          cat programmes.xml >> gesamt.xml
          echo '</tv>' >> gesamt.xml
          
          # Komprimieren
          gzip -f gesamt.xml
          
          echo "✅ Deutsche EPG erstellt: $(wc -c < gesamt.xml.gz) Bytes"
