name: EPG Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Zeige Datum
        run: |
          echo "✅ Workflow läuft!"
          echo "📅 Datum: $(date)"
          echo "🌐 GitHub Actions: JA"
      
      - name: Erstelle Test-Datei
        run: |
          mkdir -p public/epg/de
          echo '{"test":"ok","zeit":"$(date)"}' > public/index.json
          echo '<?xml version="1.0"?><tv><channel id="test"><display-name>Test</display-name></channel></tv>' > public/epg/de/test.xml
      
      - name: Zeige Dateien
        run: |
          echo "📁 Erstellte Dateien:"
          find public -type f
