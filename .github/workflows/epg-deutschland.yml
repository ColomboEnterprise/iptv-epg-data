name: EPG für Deutschland (gefiltert)

on:
  workflow_dispatch:

jobs:
  filter-german-epg:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v4
        
      - name: EPG laden und filtern
        run: |
          echo "=========================================="
          echo "📡 EPG für Deutschland wird geladen..."
          echo "=========================================="
          
          # Verzeichnis erstellen
          mkdir -p public/epg/de
          
          # EPG von iptvx.one laden
          echo "⬇️ Lade EPG von iptvx.one..."
          curl -L -o epg.xml.gz "https://iptvx.one/epg/epg.xml.gz"
          
          # Prüfen ob Download erfolgreich
          if [ ! -f epg.xml.gz ] || [ ! -s epg.xml.gz ]; then
            echo "❌ Download fehlgeschlagen!"
            exit 1
          fi
          
          # Entpacken
          echo "📦 Entpacke EPG..."
          gunzip -f epg.xml.gz
          
          # Prüfen ob entpackt
          if [ ! -f epg.xml ] || [ ! -s epg.xml ]; then
            echo "❌ Entpacken fehlgeschlagen!"
            exit 1
          fi
          
          # Dateigröße anzeigen
          TOTAL_SIZE=$(wc -c < epg.xml)
          echo "📊 Gesamtgröße: $(($TOTAL_SIZE / 1024 / 1024)) MB"
          
          # Deutsche Sender filtern
          echo ""
          echo "🔍 Filtere deutsche Sender..."
          echo "=========================================="
          
          # Liste der deutschen Sender-Kennungen (erweitert)
          PATTERNS="\.de|ard|zdf|rtl|sat\.1|prosieben|kabel|vox|ntv|dmax|tele5|sixx|kika|3sat|arte|phoenix|br|hr|mdr|ndr|rbb|swr|wdr|tagesschau|einsfestival|zdfinfo|zdfneo|rtl2|superrtl|kabeleins|welt|n24|eurosport|sport1|mtv|nick|comedycentral|disney"
          
          # Channels extrahieren
          echo "📺 Extrahiere deutsche Channels..."
          
          # Bessere Extraktion: Ganze Channel-Blöcke holen
          awk '/<channel/,/<\/channel>/' epg.xml | grep -E "id=\"[^\"]*($PATTERNS)" -B10 -A10 > public/epg/de/channels_raw.xml.tmp || true
          
          # Duplikate entfernen und bereinigen
          grep -E "<channel.*id=" public/epg/de/channels_raw.xml.tmp | sort -u > public/epg/de/channels.xml.tmp
          
          # Volle Channel-Blöcke extrahieren
          > public/epg/de/channels.xml
          while IFS= read -r channel_line; do
            channel_id=$(echo "$channel_line" | grep -o 'id="[^"]*"' | head -1 | cut -d'"' -f2)
            if [ ! -z "$channel_id" ]; then
              awk "/<channel.*id=\"$channel_id\"/,/<\/channel>/" epg.xml >> public/epg/de/channels.xml
            fi
          done < public/epg/de/channels.xml.tmp
          
          CHANNEL_COUNT=$(grep -c "<channel" public/epg/de/channels.xml)
          echo "   ✅ $CHANNEL_COUNT deutsche Channels gefunden"
          
          # Dazugehörige Programme extrahieren
          echo "📺 Extrahiere Programme für deutsche Channels..."
          > public/epg/de/programmes.xml
          
          while IFS= read -r channel_line; do
            channel_id=$(echo "$channel_line" | grep -o 'id="[^"]*"' | head -1 | cut -d'"' -f2)
            
            if [ ! -z "$channel_id" ] && [ "$channel_id" != "id=" ]; then
              # Programme für diese Channel-ID finden (ganze Blöcke)
              awk "/<programme.*channel=\"$channel_id\"/,/<\/programme>/" epg.xml >> public/epg/de/programmes.xml.tmp || true
            fi
          done < public/epg/de/channels.xml
          
          # Duplikate in Programmen entfernen
          if [ -f public/epg/de/programmes.xml.tmp ]; then
            sort -u public/epg/de/programmes.xml.tmp > public/epg/de/programmes.xml
            rm public/epg/de/programmes.xml.tmp
          fi
          
          PROG_COUNT=$(grep -c "<programme" public/epg/de/programmes.xml 2>/dev/null || echo "0")
          echo "   ✅ $PROG_COUNT Programme für deutsche Channels gefunden"
          
          # Gesamt-XML erstellen
          echo ""
          echo "📦 Erstelle gesamt.xml..."
          echo "=========================================="
          
          cd public/epg/de
          
          cat > gesamt.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv generator-info-name="IPTV-EPG-Generator" generator-info-url="https://github.com/iptv-org/epg">
EOF
          
          # Channels einfügen
          cat channels.xml >> gesamt.xml
          
          # Programme einfügen
          if [ -f programmes.xml ] && [ -s programmes.xml ]; then
            cat programmes.xml >> gesamt.xml
          fi
          
          echo "</tv>" >> gesamt.xml
          
          # Statistik
          FINAL_SIZE=$(wc -c < gesamt.xml)
          FINAL_CHANNELS=$(grep -c "<channel" gesamt.xml)
          FINAL_PROGS=$(grep -c "<programme" gesamt.xml)
          
          echo "✅ gesamt.xml erstellt:"
          echo "   📊 Größe: $(($FINAL_SIZE / 1024 / 1024)) MB"
          echo "   📺 Kanäle: $FINAL_CHANNELS"
          echo "   📺 Programme: $FINAL_PROGS"
          
          # Komprimieren für Cloudflare
          echo ""
          echo "📦 Komprimiere für Cloudflare..."
          gzip -f gesamt.xml
          
          GZIP_SIZE=$(wc -c < gesamt.xml.gz)
          echo "   ✅ gesamt.xml.gz: $(($GZIP_SIZE / 1024 / 1024)) MB"
          
          # Index.json erstellen
          cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": $FINAL_CHANNELS,
  "totalProgrammes": $FINAL_PROGS,
  "fileSize": $FINAL_SIZE,
  "fileSizeCompressed": $GZIP_SIZE,
  "source": "iptvx.one (gefiltert)"
}
EOF
          
          echo "✅ index.json erstellt"
          echo "   📄 Inhalt:"
          cat index.json
          
          # Aufräumen
          rm -f channels.xml programmes.xml channels_raw.xml.tmp channels.xml.tmp programmes.xml.tmp 2>/dev/null || true
          
          cd ../..
          
          echo ""
          echo "=========================================="
          echo "✅ EPG-Filterung abgeschlossen!"
          echo "=========================================="
          echo ""
          echo "📊 Finale Dateien:"
          ls -la public/epg/de/
      
      - name: 📤 Zu Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Abschluss
        run: |
          echo ""
          echo "=========================================="
          echo "✅ EPG-Update abgeschlossen!"
          echo "=========================================="
          echo ""
          echo "📊 Verfügbar unter:"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/gesamt.xml.gz"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/index.json"
          echo ""
          if [ -f public/epg/de/gesamt.xml.gz ]; then
            SIZE=$(wc -c < public/epg/de/gesamt.xml.gz)
            echo "📦 Dateigröße: $(($SIZE / 1024 / 1024)) MB"
            echo ""
            echo "📊 Statistiken aus index.json:"
            cat public/epg/de/index.json
          fi
          echo "=========================================="
