name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: iptv-org/epg klonen und EPG generieren
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
          
          echo "🚀 Generiere EPG für deutsche Sender..."
          mkdir -p ../public/epg/de
          
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "kabeleins.de"
            "vox.de"
            "ntv.de"
            "welt.de"
            "dmax.de"
            "tele5.de"
            "sixx.de"
            "rtl2.de"
            "superrtl.de"
            "kika.de"
            "3sat.de"
            "arte.tv"
            "phoenix.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo "Generiere $sender..."
            npm run grab --- --site=$sender --output=../public/epg/de/$sender.xml --days=7 --gzip --maxConnections=3 || echo "⚠️ Fehler bei $sender"
            sleep 1
          done
          
          cd ..
      
      - name: Index-Datei erstellen
        run: |
          cd public/epg/de
          
          cat > index.json << EOF
          {
            "lastUpdate": "$(date -Iseconds)",
            "country": "Deutschland",
            "countryCode": "de",
            "totalChannels": $(ls *.xml 2>/dev/null | wc -l),
            "channels": [
          EOF
          
          first=1
          for file in *.xml; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> index.json
            fi
            echo "    {\"channel\": \"$(basename "$file" .xml)\", \"file\": \"$file\"}" >> index.json
          done
          
          echo "" >> index.json
          echo "  ]" >> index.json
          echo "}" >> index.json
      
      - name: Gesamt-EPG erstellen
        run: |
          cd public/epg/de
          cat $(ls *.xml | sort) > gesamt.xml 2>/dev/null || echo "Keine XML-Dateien"
          echo "✅ Gesamt-EPG erstellt"
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"  # 🔥 WICHTIG: Ihr tatsächlicher Projektname
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
