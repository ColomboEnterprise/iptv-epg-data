name: EPG

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Erstelle Ordner
        run: mkdir -p public/epg/de
      
      - name: Erstelle Test-EPG
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/de/gesamt.xml
          echo '<tv>' >> public/epg/de/gesamt.xml
          echo '  <channel id="ard.de"><display-name>ARD</display-name></channel>' >> public/epg/de/gesamt.xml
          echo '  <programme channel="ard.de" start="20250311200000 +0100" stop="20250311201500 +0100"><title>Test</title></programme>' >> public/epg/de/gesamt.xml
          echo '</tv>' >> public/epg/de/gesamt.xml
      
      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv-epg-data
          directory: public
